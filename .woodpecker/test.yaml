---
when:
  event: [push, pull_request]
  path:
    exclude: [CHANGELOG.md]
matrix:
  RUST: [stable, beta, nightly]
steps:
  test:
    image: rust@sha256:5474dce321a62be62d86355e776a035587345eb385e049760cfb6b04b6fa9025
    environment:
      CARGO_TERM_COLOR: always
    commands: [rustup default $RUST, cargo test]
  audit:
    image: woodpeckerci/plugin-trivy@sha256:27a5d91ef8ca9da29540e4ddff43001f7ec44325f5d0ecfcfbe450cd99394302
    commands: [trivy fs .]
